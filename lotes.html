<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Mapa Satélite</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

</head>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    h1 {
        text-align: center;
        padding: 20px 0;
        margin: 0;
        background: #333;
        color: white;
    }

    #map {
        width: 100%;
        height: 100vh;
    }

    #coords {
        position: absolute;
        bottom: 15px;
        left: 15px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
    }
</style>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


</body>

<script>

    // URL da planilha publicada como CSV
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNsRyrCfXEjaNl5EmXLWHJLMj3wQb3H4df7leBdi8yzvUDunczFL0s0BK2R--PKcJ0-TFhWrcjL1t/pub?gid=0&single=true&output=csv";

    // Inicializa o mapa
    const map = L.map("map", {
        zoomControl: true,
        maxZoom: 18,
        minZoom: 1
    });


    // Camada de satélite
    L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
            maxZoom: 18,
            attribution: "Tiles © Esri"
        }
    ).addTo(map);

    // Carrega planilha
    fetch(sheetUrl)
        .then(res => res.text())
        .then(csv => {

            Papa.parse(csv, {

                header: true,
                skipEmptyLines: true,

                complete: function (results) {

                    const terrenos = results.data;

                    const bounds = L.latLngBounds();

                    terrenos.forEach(t => {

                        if (!t.poligono) return;

                        // Converte a string em coordenadas
                        const pontos = t.poligono
                            .split(";")
                            .map(p => {

                                const [lat, lng] = p.split(",");

                                return [
                                    parseFloat(lat.trim()),
                                    parseFloat(lng.trim())
                                ];

                            });

                        // Verifica se todas as coordenadas são válidas
                        if (pontos.some(p => isNaN(p[0]) || isNaN(p[1]))) {
                            console.warn("Polígono inválido:", t.nome);
                            return;
                        }

                        // Cor conforme status
                        const color =
                            t.status === "disponivel" ? "#00FF1E" :
                                t.status === "vendido" ? "#FF0000" :
                                    "#FFA500";

                        // Desenha o terreno
                        const terreno = L.polygon(pontos, {

                            color: color,
                            fillColor: color,
                            fillOpacity: 0.35,
                            weight: 3

                        })
                            .bindPopup(`
                            <b>${t.nome}</b><br>
                            Status: ${t.status}<br>
                            Preço: R$ ${t.preco}
                        `)
                            .addTo(map);

                        // Ajusta os limites do mapa
                        bounds.extend(terreno.getBounds());

                    });

                    if (bounds.isValid()) {

                        map.fitBounds(bounds);

                        // Mantém o zoom inicial igual ao seu código
                        map.setZoom(18);

                    }

                }

            });

        })
        .catch(err => console.error("Erro ao carregar planilha:", err));

</script>

</html>
